# UAV资源分配仿真配置文件
# 格式: INI风格的配置文件

[scenario]
# 仿真场景基础配置
name = UAV Resource Allocation
duration = 200.0         # 仿真时长(秒)
num_nodes = 15           # UAV节点数量
output_dir = output/resource_allocation

[resource_allocation]
# 资源分配策略配置
strategy = graph_coloring    # 可选: static, greedy, graph_coloring, interference_aware, rl_based
num_channels = 3             # 可用信道数量
reallocation_interval = 5.0  # 资源重分配间隔(秒)
enable_power_control = true  # 是否启用功率控制
enable_rate_adaptation = true # 是否启用速率自适应
enable_load_balancing = true  # 是否启用负载均衡

[power_control]
# 功率控制参数
tx_power_min = 10.0      # 最小发射功率(dBm)
tx_power_max = 30.0      # 最大发射功率(dBm)
target_sinr = 15.0       # 目标SINR(dB)
noise_power = -90.0      # 噪声功率(dBm)

[rate_adaptation]
# 速率自适应参数
data_rate_min = 1.0      # 最小数据速率(Mbps)
data_rate_max = 11.0     # 最大数据速率(Mbps)

[qos_requirements]
# QoS性能要求
target_pdr = 0.85        # 目标分组投递率 (85%)
max_delay = 0.1          # 最大端到端时延(秒) (100ms)
min_throughput = 0.5     # 最小吞吐量(Mbps)

[topology]
# 网络拓扑参数
area_size = 500.0        # 仿真区域大小(米)
uav_height = 50.0        # UAV飞行高度(米)
max_speed = 20.0         # 最大飞行速度(m/s)
communication_range = 150.0  # 通信距离阈值(米)

[traffic]
# 业务流量配置
traffic_pattern = mixed  # 可选: cbr, poisson, mixed
packet_size = 1024       # 数据包大小(字节)
packet_rate = 100.0      # 数据包发送速率(packets/s)

# 混合业务比例
heartbeat_prob = 0.4     # 心跳包比例
video_prob = 0.3         # 视频流比例
sensor_prob = 0.2        # 传感器数据比例
control_prob = 0.1       # 控制指令比例

[mobility]
# 移动模型配置
model = random_walk      # 可选: random_walk, waypoint, gauss_markov
bounds_x = 500.0         # X轴边界(米)
bounds_y = 500.0         # Y轴边界(米)
bounds_z_min = 40.0      # Z轴最小高度(米)
bounds_z_max = 60.0      # Z轴最大高度(米)
speed_min = 5.0          # 最小速度(m/s)
speed_max = 20.0         # 最大速度(m/s)

[channel]
# 信道模型配置
model = friis            # 可选: friis, log_distance, cost231
frequency = 2.4e9        # 工作频率(Hz) 2.4GHz
system_loss = 1.0        # 系统损耗

[logging]
# 日志配置
enable_resource_log = true
enable_qos_log = true
enable_topology_log = true
log_interval = 1.0       # 日志记录间隔(秒)

[visualization]
# 可视化配置
enable_animation = false  # 是否生成动画
enable_plots = true       # 是否生成图表
plot_format = png         # 图表格式: png, pdf, svg

